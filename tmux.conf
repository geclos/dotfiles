# Change prefix from 'C-b' to 'C-Space'
unbind C-b
set-option -g prefix C-Space
bind-key Space send-prefix
# Rebind tmux reload

unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Set default split size for horizontal splits
set-hook -g after-split-window "resize-pane -y 30"

# Mouse on
set -g mouse on
set-option -s set-clipboard on

# Move status bar to top
set-option -g status-position top

# Remove key delays
set -s escape-time 0

# Add key binding for quick search in copy mode
bind-key / copy-mode \; command-prompt -p "Search Up:" "send -X search-backward \"%%%\""

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# Sane keymaps to navigate between windows and sessions. Disabled if we are in
# Vim.
bind-key -n 'C-w' if-shell "$is_vim" '' 'choose-session'
bind-key -n 'C-n' if-shell "$is_vim" '' 'next-window'
bind-key -n 'C-p' if-shell "$is_vim" '' 'previous-window'

# Simple session management under the tmux prefix.
bind-key s command-prompt -p "New session name:" "new-session -s \"%%%\""
bind-key S command-prompt -I "#{session_name}" -p "Rename session:" "rename-session \"%%%\""
bind-key X run-shell 'current_session=$(tmux display-message -p "#{session_name}"); session_count=$(tmux list-sessions | wc -l | tr -d "[:space:]"); if [ "$session_count" -gt 1 ]; then tmux switch-client -n; else replacement_session="session-$(date +%s)"; tmux new-session -d -s "$replacement_session"; tmux switch-client -t "$replacement_session"; fi; tmux kill-session -t "$current_session"'

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# === CATPUCCIN CONFIG ===
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.tmux/plugins/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

set -g @catppuccin_window_text " #{window_name}"

# TPM
set -g @plugin 'tmux-plugins/tpm' # tmux plugin manager

# List of plugins
set -g @plugin 'Ataraxy-Labs/opensessions'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-pain-control' # pane navigation with vim motions

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
